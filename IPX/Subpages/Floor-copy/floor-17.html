        body {

        .content-wrapper {

        .content-wrapper img {

        }

        .Cutout {

            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(var(--scene-scale, 1));
            width: 90vmin;
            /* aspect-ratio: 4096 / 4096; */
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;

            z-index: 1;
        }

        .Cutout svg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: auto;
            height: auto;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
        }

        .Cutout path {
            pointer-events: auto;
            fill: transparent;
            pointer-events: auto;
            cursor: pointer;
            stroke: transparent;
            stroke-width: 4px;
            stroke-linejoin: round;
            stroke-linecap: round;
            transition: stroke 0.3s ease, fill 0.3s ease;
        }


        .Cutout path:hover {
            /* stroke: rgb(141, 127, 205);
    fill: rgba(0, 0, 255, 0.2); */
            /* stroke: #004771; */
            stroke: #a3845d;
            /* fill: rgba(0, 71, 113, 0.4); */
            fill: rgba(186, 167, 145, 0.75);
        }


        .Cutout path.selected {
            /* stroke: rgb(255, 140, 0); */
            /* stroke: rgb(233, 182, 59); */
            /* stroke: #00629b; */
            stroke: #8d7252;
            /* Orange */

        .lobby-top {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(7, 7, 7);
        }

        .content-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .content-wrapper img {
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            object-position: center;
            user-select: none;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .lobby-top {
                overflow: hidden;
                cursor: grab;
                align-items: flex-start;
                justify-content: flex-start;
                position: relative;
            }

            .lobby-top.dragging {
                cursor: grabbing;
            }

            /* content-wrapper is the pannable container — image + SVG cutout both move together */
            .content-wrapper {
                position: absolute;
                top: 0;
                left: 0;
                width: auto;
                height: 100vh;
                will-change: transform;
                flex-shrink: 0;
            }

            .content-wrapper img {
                display: block;
                width: auto;
                height: 100vh;
                max-width: none;
                object-fit: fill;
            }

            /* Cutout must be absolute inside wrapper (not fixed) so it pans with image */
            .Cutout {
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: 100% !important;
                transform: none !important;
                overflow: hidden; /* clip slice overflow */
            }

            /* SVG fills container; preserveAspectRatio="xMidYMid slice" handles scaling */
            .Cutout svg {
                position: absolute;
                top: 0;
                left: 0;
                transform: translateY(350px) !important;
                width: 100% !important;
                height: 100% !important;
                min-width: unset;
                min-height: unset;
            }
        }


        .touch-button {
            position: absolute;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%) scale(var(--btn-scale, 1));
            transform-origin: center center;

            padding: 12px 12px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            color: #000;
            cursor: pointer;
            z-index: 10;
        }

        /* FLOOR PILL BASE */
        /* FLOOR PILL BASE */
        .floor-pill {
            position: fixed;
            top: 20px;
            right: 20px;
            /* FIXED */
            z-index: 9999;

            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 999px;
            padding: 8px 12px;

            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            font-family: sans-serif;
        }

        /* BUTTON */
        .floor-pill__trigger {
            color: #000000;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 999px;
            transition: background 0.3s;
        }

        .floor-pill__trigger:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* DROPDOWN */
        .floor-pill__list {
            position: absolute;
            top: 110%;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            transform-origin: top;

            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 12px;

            display: flex;
            flex-direction: column;
            gap: 8px;

            /* ✅ CONTROL SIZE HERE */
            width: 100px;
            /* fixed width */
            max-height: 220px;
            /* limit height */
            overflow-y: auto;
            /* scroll if too many items */

            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease;
        }

        /* OPEN STATE */
        .floor-pill.open .floor-pill__list {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }

        /* ITEMS */
        .floor-pill__item {
            color: #000000;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 14px;
            transition: background 0.25s;

            text-align: center;
            /* 👈 centers text */
            display: block;
            /* ensures full width clickable */
        }

        .floor-pill__item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ACTIVE */
        .floor-pill__item.active {
            background: rgba(201, 168, 124, 0.25);
            color: #c9a87c;
        }

                    e.stopPropagation();
                    widget.classList.add("collapsed");
                    toggle.classList.add("visible");
                });
            }
            if (toggle) {
                toggle.addEventListener("click", () => {
                    widget.classList.remove("collapsed");
                    toggle.classList.remove("visible");
                });
            }

            const closeCard = document.getElementById("closeCard");
            if (closeCard) {
                closeCard.addEventListener("click", () => {
                    document.getElementById("closeCard").addEventListener("click", () => {
                        window.history.back();
                    });
                });
            }

            // Block pointer events from reaching Panolens canvas
            ['mousedown', 'mouseup', 'click', 'pointerdown', 'pointerup', 'touchstart', 'touchend'].forEach(evt => {
                widget.addEventListener(evt, e => e.stopPropagation());
            });
        });
    </script>

            function reset(icon, svg, label) { icon.style.background = ''; icon.style.borderColor = ''; icon.style.boxShadow = ''; svg.style.stroke = ''; svg.style.filter = ''; label.style.opacity = '0'; label.style.scale = '.9'; label.style.translate = '0 6px'; }
            function resetAll() { items.forEach(item => { const icon = item.querySelector('.dock-icon'), svg = item.querySelector('.dock-icon svg'), label = item.querySelector('.dock-label'); icon.style.width = icon.style.height = ''; icon.style.borderRadius = ''; svg.style.width = svg.style.height = ''; item.style.width = ''; reset(icon, svg, label); }); }
            dockItems.addEventListener('mousemove', magnify); dockItems.addEventListener('mouseleave', resetAll);

    <script>
        // Mobile drag-to-pan (horizontal only)
        // The .Cutout SVG overlay is position:absolute inside .content-wrapper on mobile
        // so it pans together with the image automatically via wrapper transform.
        (function () {
            if (window.innerWidth > 600) return;
            const lobby = document.querySelector('.lobby-top');
            const wrapper = document.querySelector('.content-wrapper');
            const img = wrapper ? wrapper.querySelector('img') : null;
            if (!lobby || !wrapper || !img) return;

            let isDragging = false;
            let startX = 0;
            let translateX = 0;
            let imgNaturalW = 0;

            function getImgWidth() {
                // Use rendered offsetWidth; fallback to naturalWidth ratio
                if (img.offsetWidth > 0) return img.offsetWidth;
                if (img.naturalWidth && img.naturalHeight) {
                    return Math.round(img.naturalWidth * (window.innerHeight / img.naturalHeight));
                }
                return window.innerWidth * 2;
            }

            function clamp(val, min, max) { return Math.min(Math.max(val, min), max); }

            function applyTransform() {
                const imgW = getImgWidth();
                const minX = -(imgW - window.innerWidth);
                translateX = clamp(translateX, Math.min(minX, 0), 0);
                wrapper.style.transform = 'translateX(' + translateX + 'px)';
            }

            function initCenter() {
                const imgW = getImgWidth();
                translateX = -((imgW - window.innerWidth) / 2);
                applyTransform();
            }

            // Touch
            lobby.addEventListener('touchstart', function(e) {
                if (e.touches.length !== 1) return;
                isDragging = true;
                startX = e.touches[0].clientX - translateX;
                lobby.classList.add('dragging');
            }, { passive: true });

            lobby.addEventListener('touchmove', function(e) {
                if (!isDragging || e.touches.length !== 1) return;
                translateX = e.touches[0].clientX - startX;
                applyTransform();
            }, { passive: true });

            lobby.addEventListener('touchend', function() {
                isDragging = false;
                lobby.classList.remove('dragging');
            });

            // Mouse (desktop fallback for dev)
            lobby.addEventListener('mousedown', function(e) {
                isDragging = true;
                startX = e.clientX - translateX;
                lobby.classList.add('dragging');
            });
            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                translateX = e.clientX - startX;
                applyTransform();
            });
            window.addEventListener('mouseup', function() {
                isDragging = false;
                lobby.classList.remove('dragging');
            });

            // Init after image loads (or immediately if cached)
            if (img.complete && img.naturalWidth > 0) {
                initCenter();
            } else {
                img.addEventListener('load', initCenter);
            }
            window.addEventListener('load', initCenter);
        })();
    </script>

    <script>
        (function () {
            const pill = document.getElementById('floorPill');
            const trigger = document.getElementById('floorTrigger');
            if (!pill || !trigger) return;

            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                pill.classList.toggle('open');
            });

            // close on outside click
            document.addEventListener('click', function (e) {
                if (!pill.contains(e.target)) {
                    pill.classList.remove('open');
                }
            });

            // prevent floor item clicks closing before nav
            document.querySelectorAll('.floor-pill__item').forEach(function (item) {
                item.addEventListener('click', function (e) {
                    e.stopPropagation();
                });
            });
        })();

    <script>
    (function() {
        const tooltip = document.getElementById('aptTooltip');
        const ttBhk   = document.getElementById('ttBhk');
        const ttArea  = document.getElementById('ttArea');
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX; mouseY = e.clientY;
            if (tooltip.classList.contains('visible')) positionTooltip();
        });
        function positionTooltip() {
            const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
            let x = mouseX + 18, y = mouseY + 18;
            if (x + tw > window.innerWidth - 10)  x = mouseX - tw - 14;
            if (y + th > window.innerHeight - 10) y = mouseY - th - 14;
            tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
        }
        document.querySelectorAll('.Cutout path').forEach(function(path) {
            const bhk  = path.getAttribute('data-bhk');
            const area = path.getAttribute('data-area');
            if (!bhk && !area) return;
            path.addEventListener('mouseenter', function() {
                ttBhk.textContent  = bhk  || '\u2014';
                ttArea.textContent = area || '\u2014';
                positionTooltip();
                tooltip.classList.add('visible');
            });
            path.addEventListener('mouseleave', function() {
                tooltip.classList.remove('visible');
            });
        });
    })();
    </script>

    <script>
    /* Mobile: tap apartment path -> show panel */
    (function() {
        const panel = document.getElementById('mobileAptPanel');
        const mBhk  = document.getElementById('mAptBhk');
        const mArea = document.getElementById('mAptArea');
        if (!panel) return;
        let hideTimer = null;
        function showPanel(bhk, area) {
            mBhk.textContent  = bhk  || '—';
            mArea.textContent = area || '—';
            panel.style.opacity   = '1';
            panel.style.transform = 'translateX(-50%) translateY(0)';
            panel.style.pointerEvents = 'auto';
            clearTimeout(hideTimer);
            hideTimer = setTimeout(hidePanel, 3000);
        }
        function hidePanel() {
            panel.style.opacity   = '0';
            panel.style.transform = 'translateX(-50%) translateY(20px)';
            panel.style.pointerEvents = 'none';
        }
        document.querySelectorAll('.Cutout path').forEach(function(path) {
            const bhk  = path.getAttribute('data-bhk');
            const area = path.getAttribute('data-area');
            if (!bhk && !area) return;
            path.addEventListener('touchstart', function(e) {
                e.stopPropagation();
                showPanel(bhk, area);
            }, { passive: true });
        });
        panel.addEventListener('click', hidePanel);
    })();
    </script>
