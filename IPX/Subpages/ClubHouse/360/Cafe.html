    #ciWidget {
      position: absolute;
      top: 5%;
      right: 2%;
      width: 265px;
      font-family: 'Jost', sans-serif;
      z-index: 10;
    }

    /* CARD — two-column grid layout */
    #ciCard {
      border-radius: 16px;
      overflow: hidden;
      background: rgba(248, 249, 251, 0.97);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid rgba(100, 150, 175, 0.18);
      border-top: 2px solid #8ab8cc;
      box-shadow:
        0 12px 36px rgba(20, 55, 90, 0.12),
        0 4px 10px rgba(20, 55, 90, 0.07),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      display: grid;
      grid-template-areas:
        "top   top"
        "sqft  dims"
        "face  face";
      grid-template-columns: 95px 1fr;
    }

    /* HEADER — full width */
    .ci-top {
      grid-area: top;
      background: linear-gradient(160deg, #b8d8ea 0%, #cce6f2 100%);
      padding: 13px 14px 11px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid rgba(100, 150, 175, 0.2);
    }

    .ci-top-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .ci-breadcrumb {
      font-size: 7.5px;
      letter-spacing: 2.5px;
      color: rgba(10, 45, 70, 0.75);
      text-transform: uppercase;
    }

    .ci-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      line-height: 1.05;
      color: #07131e;
      font-weight: 600;
    }

    .ci-sub {
      font-size: 9px;
      color: rgba(10, 40, 65, 0.55);
    }

    .ci-badge {
      border: 1px solid rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.3);
      color: #0d3a52;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 8px;
      letter-spacing: 0.5px;
      height: fit-content;
      white-space: nowrap;
      margin-top: 3px;
    }

    /* SQFT — left column, centred hero number */
    .ci-sqft {
      grid-area: sqft;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 6px;
      background: rgba(100, 150, 175, 0.05);
      border-right: 1px solid rgba(100, 150, 175, 0.12);
      border-bottom: 1px solid rgba(100, 150, 175, 0.1);
      gap: 3px;
    }

    .ci-sqft-num {
      font-size: 46px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      color: #2e7a96;
      line-height: 1;
      letter-spacing: -1px;
    }

    .ci-sqft-meta {
      font-size: 8.5px;
      color: rgba(30, 65, 90, 0.5);
      text-align: center;
      line-height: 1.55;
      margin-left: 0;
    }

    /* DIMS — right column, stacked rows */
    .ci-dims {
      grid-area: dims;
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid rgba(100, 150, 175, 0.1);
    }

    .ci-dim {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      border-bottom: 1px solid rgba(100, 150, 175, 0.07);
    }

    .ci-dim:last-child {
      border-bottom: none;
    }

    .ci-dim-label {
      font-size: 7.5px;
      color: rgba(30, 65, 90, 0.55);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .ci-dim-value {
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      color: #111c26;
    }

    /* FACING — full-width bottom strip */
    .ci-facing {
      grid-area: face;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      background: rgba(100, 150, 175, 0.04);
    }

    .ci-facing-title {
      font-size: 7.5px;
      color: rgba(30, 65, 90, 0.55);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .ci-facing-dir {
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      color: #111c26;
    }

    .ci-sun {
      margin-left: auto;
      background: rgba(100, 150, 175, 0.09);
      border: 1px solid rgba(100, 150, 175, 0.25);
      color: #2e6880;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 8px;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    /* ── Tour Nav (pill bar) ── */
    .tour-nav {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      background: rgba(70, 70, 70, .35);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 18px;
      z-index: 10000;
    }

    .tour-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 12px;
      background: #2b2b2b;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: .25s;
      text-decoration: none;
    }

    .tour-pill svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: block;
    }

    .tour-pill:hover {
      background: #353535;
      transform: translateY(-1px);
    }

    .tour-pill.active {
      background: #111;
    }
  </style>

  <script>
    function createArrowSVG() {
      const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <polygon points="50,20 75,65 50,55 25,65" fill="white"/>
  </svg>

    }

  <script>
    // 1) Define both images
    // const LOW_SRC = "./../../../images/Thumbnail/Apartments/3BHK/360/Lobby.webp";
    const LOW_SRC = "./../../../images/Apartments/Clubhouse/Cafe.jpg";
    const HIGH_SRC = "./../../../images/Apartments/Clubhouse/Cafe.jpg";

    const imageContainer = document.querySelector(".image-container");

    // 2) Create panoramas
    const panoLow = new PANOLENS.ImagePanorama(LOW_SRC);
    const panoHigh = new PANOLENS.ImagePanorama(HIGH_SRC);

    // 3) Viewer
    const viewer = new PANOLENS.Viewer({
      container: imageContainer,
      autoRotate: false,
      autoRotateSpeed: 0.1,
      controlBar: false,
      cameraFov: 80
    });

    // after: const viewer = new PANOLENS.Viewer({...});
    let didInitView = false;

    // Keep the same initial yaw on both (texture yaw)
    const TEXTURE_YAW = -Math.PI / 2 + 0; // your existing value
    panoLow.rotation.y = TEXTURE_YAW;
    panoHigh.rotation.y = TEXTURE_YAW;

    // Desired tilt DOWN amount (pitch)
    const TILT_DOWN = Math.PI / 50; // ~16°

    function setInitialViewAndLockPitch() {
      if (didInitView) return;   // ✅ run only once (prevents flicker on swap)
      didInitView = true;

      const controls = viewer.getControl();

      // Positive value here, we pass -TILT to tilt DOWN
      const TILT = -Math.PI / 40;     // adjust how much you want to tilt
      controls.rotateUp(-TILT);      // tilt down

      // No vertical limits (free up/down)
      if ('minPolarAngle' in controls && 'maxPolarAngle' in controls) {
        controls.minPolarAngle = 0;          // can look straight up
        controls.maxPolarAngle = Math.PI;    // can look straight down
      }

      // Optional: rotation only (no panning)
      if ('enablePan' in controls) controls.enablePan = false;
    }


    // Apply same camera view when each pano becomes active
    panoLow.addEventListener('enter', setInitialViewAndLockPitch);
    panoHigh.addEventListener('enter', setInitialViewAndLockPitch);

    // Start with low; add both to viewer for smooth swap
    viewer.add(panoLow);
    viewer.add(panoHigh);
    viewer.setPanorama(panoLow);


    function degToRad(deg) {
      return deg * Math.PI / 180;
    }

    function setFromAngles(spot, yawDeg, pitchDeg, radius = 5000) {
      const yaw = degToRad(yawDeg);
      const pitch = degToRad(pitchDeg);

      const x = radius * Math.cos(pitch) * Math.sin(yaw);
      const y = radius * Math.sin(pitch);
      const z = radius * Math.cos(pitch) * Math.cos(yaw);

      spot.position.set(x, y, z);
    }





    const SIZE = 450;


    // 🔴 Hotspot 1

    const ARROW_ICON = createArrowSVG();

    const spot1 = new PANOLENS.Infospot(SIZE, ARROW_ICON);
    setFromAngles(spot1, 0, 0);
    spot1.addHoverText("Banquet Hall");
    spot1.addEventListener('click', () => {
      // keep visible for a moment
      setTimeout(() => {
        window.location.href = "Banquet_Hall.html";
      }, 800); // 0.8 sec delay
    });

    
    

    // ✅ Add all to panorama
    [panoLow, panoHigh].forEach(pano => {
      pano.add(spot1);
    });
    // Preload + swap high-res when ready
    panoLow.addEventListener("load", () => {
      panoHigh.addEventListener("load", () => {
        viewer.setPanorama(panoHigh, 600); // fade swap
        console.log("✅ Swapped to high-res panorama");
      });
      panoHigh.load();
    });

    panoHigh.addEventListener("error", (e) => {
      console.warn("⚠️ Failed to load high-res:", e);
    });
  </script>
