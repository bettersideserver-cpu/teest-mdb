    <title>MDB The Lutyens</title>
    <link rel="stylesheet" href="JS/CSS/yp0wlolwzw.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .content-wrapper {
            position: relative;
            display: inline-block;
        }

        .content-wrapper img {
            display: block;
            height: auto;
            width: 100%;
        }

        .Cutout {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(var(--scene-scale, 1));
            width: 90vmin;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .Cutout svg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: auto;
            height: auto;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
        }

        .Cutout path {
            pointer-events: auto;
            fill: transparent;
            cursor: pointer;
            stroke: transparent;
            stroke-width: 4px;
            stroke-linejoin: round;
            stroke-linecap: round;
            transition: stroke 0.3s ease, fill 0.3s ease;
        }

        .Cutout path:hover {
            stroke: #a3845d;
            fill: rgba(186, 167, 145, 0.4);
        }

        .Cutout path.selected {
            stroke: #8d7252;
            fill: rgba(163, 146, 128, 0.5);
        }

        .lobby-top {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(7, 7, 7);
        }

        .content-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .content-wrapper img {
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            object-position: center;
            user-select: none;
            pointer-events: none;
        }

        /* ── MOBILE ── */
        @media (max-width: 600px) {
            body {
                overflow: hidden;
            }

            .lobby-top {
                overflow: hidden;
                cursor: grab;
                align-items: flex-start;
                justify-content: flex-start;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
            }

            .lobby-top.dragging {
                cursor: grabbing;
            }

            /* content-wrapper becomes the panning container */
            .content-wrapper {
                position: absolute;
                top: 0;
                left: 0;
                /* width & height set by JS after image loads */
                width: auto;
                height: 100vh;
                will-change: transform;
                flex-shrink: 0;
            }

            .content-wrapper img {
                display: block;
                width: auto;
                height: 100vh;
                max-width: none;
                object-fit: fill;
            }

            /* SVG sits INSIDE content-wrapper, so it pans with the image */
            .Cutout {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                /* override fixed positioning */
                transform: none !important;
                pointer-events: none; /* let touch events pass for panning; paths still get pointer-events:auto */
            }

            .Cutout svg {
                position: absolute;
                top: 0;
                left: 0;
                transform: none;
                width: 100%;
                height: 100%;
                min-width: unset;
                min-height: unset;
            }

            /* hide tooltip on mobile */
            #aptTooltip {
                display: none !important;
            }

            /* hide unwanted scroll artifacts */
            .floor-pill, #floorPill {
                display: none !important;
            }
        }

        .touch-button {
            position: absolute;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%) scale(var(--btn-scale, 1));
            transform-origin: center center;
            padding: 12px 12px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            color: #000;
            cursor: pointer;
            z-index: 10;
        }

        /* FLOOR PILL */
        .floor-pill {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 999px;
            padding: 8px 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            font-family: sans-serif;
        }

        .floor-pill__trigger {
            color: #000000;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 999px;
            transition: background 0.3s;
        }

        .floor-pill__trigger:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .floor-pill__list {
            position: absolute;
            top: 110%;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            transform-origin: top;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100px;
            max-height: 220px;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease;
        }

        .floor-pill.open .floor-pill__list {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }

        .floor-pill__item {
            color: #000000;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 14px;
            transition: background 0.25s;
            text-align: center;
            display: block;
        }

        .floor-pill__item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .floor-pill__item.active {
            background: rgba(201, 168, 124, 0.25);
            color: #c9a87c;
        }

        .touch-button:hover {
            background-color: #00649e;
            color: rgb(255, 255, 255);
        }

        .close-btn2 {
            position: fixed;
            top: 50px;
            left: 90px;
            width: 40px;
            height: 40px;
            background-color: #2c2c2c;
            border-radius: 12px;
            border: none;
            font-size: 20px;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s ease;
            z-index: 9999;
        }

        .close-btn2:hover {
            background-color: #444;
        }

        @media (max-width: 600px) {
            .close-btn2 {
                top: 50px;
                left: 30px;
            }

            .touch-button {
                --btn-scale: 0.75;
                font-size: 14px;
                padding: 10px 10px;
            }
        }

        .blur-up {
            filter: blur(10px);
            transform: scale(1.02);
            transition: filter .45s ease, transform .45s ease, opacity .35s ease;
        }

        .blur-up.is-loaded {
            filter: blur(0);
            transform: scale(1);
            opacity: 1;
        }

        .floor-badge {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 999px;
            padding: 10px 28px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: #000000;
            box-shadow: 0 8px 30px rgba(0,0,0,0.35);
            border: 1px solid rgba(201,168,124,0.3);
            white-space: nowrap;
            pointer-events: none;
        }

        /* APT TOOLTIP */
        #aptTooltip {
            position: fixed;
            z-index: 99999;
            pointer-events: none;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.18s ease, transform 0.18s ease;
            background: #1a1a1a;
            border: 1px solid rgba(201,168,124,0.35);
            border-radius: 10px;
            padding: 10px 16px;
            font-family: sans-serif;
            color: #f0f0f0;
            white-space: nowrap;
            box-shadow: 0 8px 28px rgba(0,0,0,0.55);
        }
        #aptTooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }
        #aptTooltip .tt-bhk {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 3px;
        }
        #aptTooltip .tt-area {
            font-size: 13px;
            color: #aaaaaa;
        }

        /* MOBILE DOCK */
        @media (max-width: 600px) {
            #dock, .dock {
                width: 100vw !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                transform: none !important;
                border-radius: 0 !important;
                padding: 4px 0 !important;
                display: flex !important;
                justify-content: space-around !important;
                align-items: center !important;
            }
            .dock-item {
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                justify-content: center !important;
                flex: 1 !important;
                gap: 2px !important;
                padding: 4px 2px !important;

                width: auto !important;

            }
            .dock-icon, .dock-item img, .dock-item svg {
                width: 44px !important;

                min-height: 44px !important;

            }
            .dock-item-label {
                display: block !important;

                text-align: center !important;
                margin-top: 2px !important;
            }
            .dock-item::after, .dock-item::before {
                display: none !important;
            }
            #lobby, .lobby {

            }
            .close-btn, .close-btn2, #closeBtn, #closeBtn2 {
                width: 60px !important;

            }
            #mobileAptPanel {

                font-size: 15px;
            }
            .apt-tooltip, .tooltip, [class*="tooltip"] {
                display: none !important;
            }
        }
    </style>
</head>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
      const widget = document.getElementById("ciWidget");
      const toggle = document.getElementById("ciToggle");
      const ciClose = document.getElementById("ciClose");

      if (ciClose) {
        ciClose.addEventListener("click", (e) => {
          e.stopPropagation();
          widget.classList.add("collapsed");
          toggle.classList.add("visible");
        });
      }
      if (toggle) {
        toggle.addEventListener("click", () => {
          widget.classList.remove("collapsed");
          toggle.classList.remove("visible");
        });
      }

      const closeCard = document.getElementById("closeCard");
      if (closeCard) {
        closeCard.addEventListener("click", () => {
          window.history.back();
        });
      }

      ['mousedown','mouseup','click','pointerdown','pointerup','touchstart','touchend'].forEach(evt => {
        if (widget) widget.addEventListener(evt, e => e.stopPropagation());
      });
    });
    </script>

    <script>
        (function () {
            const items = document.querySelectorAll('.dock-item'), dockItems = document.getElementById('dockItems');
            if (window.innerWidth <= 600) { return; }
            if (!dockItems || !items.length) return;
            const BASE = 52, MAX = 80, RANGE = 140;
            function magnify(e) { items.forEach(item => { const icon = item.querySelector('.dock-icon'), svg = item.querySelector('.dock-icon svg'), label = item.querySelector('.dock-label'), rect = item.getBoundingClientRect(), cx = rect.left + rect.width / 2, dist = Math.abs(e.clientX - cx); if (dist < RANGE) { const t = 1 - dist / RANGE, sz = BASE + (MAX - BASE) * t; icon.style.width = sz + 'px'; icon.style.height = sz + 'px'; icon.style.borderRadius = (16 + t * 4) + 'px'; const iSz = 22 + t * 10; svg.style.width = iSz + 'px'; svg.style.height = iSz + 'px'; item.style.width = sz + 'px'; if (t > .7) { icon.style.background = 'linear-gradient(145deg,rgba(201,168,124,.2),rgba(201,168,124,.08))'; icon.style.borderColor = 'rgba(201,168,124,.4)'; icon.style.boxShadow = '0 4px 24px rgba(201,168,124,.2)'; svg.style.stroke = '#c9a87c'; svg.style.filter = 'drop-shadow(0 0 6px rgba(201,168,124,.4))'; label.style.opacity = '1'; label.style.scale = '1'; label.style.translate = '0 0'; } else { reset(icon, svg, label); } } else { icon.style.width = BASE + 'px'; icon.style.height = BASE + 'px'; icon.style.borderRadius = '16px'; svg.style.width = '22px'; svg.style.height = '22px'; item.style.width = BASE + 'px'; reset(icon, svg, label); } }); }
            function reset(icon, svg, label) { icon.style.background = ''; icon.style.borderColor = ''; icon.style.boxShadow = ''; svg.style.stroke = ''; svg.style.filter = ''; label.style.opacity = '0'; label.style.scale = '.9'; label.style.translate = '0 6px'; }
            function resetAll() { items.forEach(item => { const icon = item.querySelector('.dock-icon'), svg = item.querySelector('.dock-icon svg'), label = item.querySelector('.dock-label'); icon.style.width = icon.style.height = ''; icon.style.borderRadius = ''; svg.style.width = svg.style.height = ''; item.style.width = ''; reset(icon, svg, label); }); }
            dockItems.addEventListener('mousemove', magnify); dockItems.addEventListener('mouseleave', resetAll);
            items.forEach(c => { c.addEventListener('click', e => { c.classList.add('is-bouncing'); c.addEventListener('animationend', () => c.classList.remove('is-bouncing'), { once: true }); const r = document.createElement('span'); r.className = 'dock-ripple'; const icon = c.querySelector('.dock-icon'), b = icon.getBoundingClientRect(), s = Math.max(b.width, b.height); r.style.width = r.style.height = s + 'px'; r.style.left = (e.clientX - b.left - s / 2) + 'px'; r.style.top = (e.clientY - b.top - s / 2) + 'px'; icon.appendChild(r); r.addEventListener('animationend', () => r.remove()); }); });
        })();
    </script>

    <script>
     window.addEventListener('DOMContentLoaded', () => {

    <!-- ============================================================
         MOBILE: drag-to-pan with SVG stuck to image
         On mobile the .Cutout is position:absolute inside .content-wrapper
         so when wrapper pans, SVG pans with it. We only need to move wrapper.
    ============================================================ -->
    <script>
    (function () {
        if (window.innerWidth > 600) return;

        const lobby   = document.getElementById('lobbyTop');
        const wrapper = document.getElementById('contentWrapper');
        const img     = document.getElementById('mainImage');
        if (!lobby || !wrapper || !img) return;

        let isDragging = false;
        let startX     = 0;
        let translateX = 0;

        function getImgWidth() {
            return img.offsetWidth || window.innerWidth;
        }

        function clamp(val, min, max) { return Math.min(Math.max(val, min), max); }

        function applyTransform() {
            const minX = -(getImgWidth() - window.innerWidth);
            translateX = clamp(translateX, minX, 0);
            wrapper.style.transform = `translateX(${translateX}px)`;
        }

        // Touch
        lobby.addEventListener('touchstart', e => {
            if (e.touches.length !== 1) return;
            isDragging = true;
            startX = e.touches[0].clientX - translateX;
            lobby.classList.add('dragging');
        }, { passive: true });

        lobby.addEventListener('touchmove', e => {
            if (!isDragging || e.touches.length !== 1) return;
            translateX = e.touches[0].clientX - startX;
            applyTransform();
        }, { passive: true });

        lobby.addEventListener('touchend', () => {
            isDragging = false;
            lobby.classList.remove('dragging');
        });

        // Mouse fallback
        lobby.addEventListener('mousedown', e => {
            isDragging = true;
            startX = e.clientX - translateX;
            lobby.classList.add('dragging');
        });
        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            applyTransform();
        });
        window.addEventListener('mouseup', () => {
            isDragging = false;
            lobby.classList.remove('dragging');
        });

        // Start centered
        function initCenter() {
            translateX = -((getImgWidth() - window.innerWidth) / 2);
            applyTransform();
        }

        if (img.complete) {
            initCenter();
        } else {
            img.addEventListener('load', initCenter);
        }
    })();
    </script>

    <!-- Floor Pill Navigator (hidden on mobile via CSS) -->
    <!-- <div class="floor-pill" id="floorPill"> ... </div> -->

    <script>
        (function () {
            const pill = document.getElementById('floorPill');
            const trigger = document.getElementById('floorTrigger');
            if (!pill || !trigger) return;

            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                pill.classList.toggle('open');
            });

            document.addEventListener('click', function (e) {
                if (!pill.contains(e.target)) {
                    pill.classList.remove('open');
                }
            });

            document.querySelectorAll('.floor-pill__item').forEach(function (item) {
                item.addEventListener('click', function (e) {
                    e.stopPropagation();
                });
            });
        })();
    </script>

    <!-- APT HOVER TOOLTIP (desktop only) -->
    <div id="aptTooltip">
        <div class="tt-bhk" id="ttBhk">3 BHK</div>
        <div class="tt-area" id="ttArea">1800 sq ft</div>
    </div>

    <script>
    (function() {
        if (window.innerWidth <= 600) return; // skip on mobile
        const tooltip = document.getElementById('aptTooltip');
        const ttBhk   = document.getElementById('ttBhk');
        const ttArea  = document.getElementById('ttArea');

        let mouseX = 0, mouseY = 0;

        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (tooltip.classList.contains('visible')) {
                positionTooltip();
            }
        });

        function positionTooltip() {
            const tw = tooltip.offsetWidth;
            const th = tooltip.offsetHeight;
            let x = mouseX + 18;
            let y = mouseY + 18;
            if (x + tw > window.innerWidth - 10)  x = mouseX - tw - 14;
            if (y + th > window.innerHeight - 10) y = mouseY - th - 14;
            tooltip.style.left = x + 'px';
            tooltip.style.top  = y + 'px';
        }

        document.querySelectorAll('.Cutout path').forEach(function(path) {
            const bhk  = path.getAttribute('data-bhk');
            const area = path.getAttribute('data-area');
            if (!bhk && !area) return;

            path.addEventListener('mouseenter', function() {
                ttBhk.textContent  = bhk  || '—';
                ttArea.textContent = area || '—';
                positionTooltip();
                tooltip.classList.add('visible');
            });

            path.addEventListener('mouseleave', function() {
                tooltip.classList.remove('visible');
            });
        });
    })();
    </script>

    <!-- Blur-up image load -->
    <script>
    (function() {
        const img = document.getElementById('mainImage');
        if (!img) return;
        function onLoad() { img.classList.add('is-loaded'); }
        if (img.complete && img.naturalWidth) { onLoad(); }
        else { img.addEventListener('load', onLoad); }
    })();
    </script>
