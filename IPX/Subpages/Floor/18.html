<!DOCTYPE html>

    <title>Typical Floor
    </title>
    <link rel="stylesheet" href="JS/CSS/yp0wlolwzw.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .content-wrapper {
            position: relative;
            display: inline-block;
        }

        .content-wrapper img {
            display: block;
            height: auto;
            width: 100%;
        }

        .Cutout {

            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(var(--scene-scale, 1));
            width: 90vmin;
            /* aspect-ratio: 4096 / 4096; */
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;

            z-index: 1;
        }

        .Cutout svg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: auto;
            height: auto;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
        }

        .Cutout path {
            pointer-events: auto;
            fill: transparent;
            pointer-events: auto;
            cursor: pointer;
            stroke: transparent;
            stroke-width: 4px;
            stroke-linejoin: round;
            stroke-linecap: round;
            transition: stroke 0.3s ease, fill 0.3s ease;
        }


        .Cutout path:hover {
            /* stroke: rgb(141, 127, 205);
    fill: rgba(0, 0, 255, 0.2); */
            /* stroke: #004771; */
            stroke: #a3845d;
            /* fill: rgba(0, 71, 113, 0.4); */
            fill: rgba(186, 167, 145, 0.4);
        }


        .Cutout path.selected {
            /* stroke: rgb(255, 140, 0); */
            /* stroke: rgb(233, 182, 59); */
            /* stroke: #00629b; */
            stroke: #8d7252;
            /* Orange */
            /* fill: rgba(0, 71, 113, 0.5); */
            fill: rgba(163, 146, 128, 0.5);
        }

        .lobby-top {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(7, 7, 7);
        }

        .content-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .content-wrapper img {
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            object-position: center;
            user-select: none;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .lobby-top {
                overflow: hidden;
                cursor: grab;
                align-items: flex-start;
                justify-content: flex-start;
            }

            .lobby-top.dragging {
                cursor: grabbing;
            }

            .content-wrapper {
                position: absolute;
                top: 0;
                left: 0;
                width: auto;
                height: 100vh;
                will-change: transform;
            }

            .content-wrapper img {
                display: block;
                width: auto;
                height: 100vh;
                max-width: none;
                object-fit: fill;
            }

            .Cutout {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                transform: none;
            }

            .Cutout svg {
                top: 0;
                left: 0;
                transform: none;
                /* 🔥 IMPORTANT */
                width: 100%;
                height: 100%;
                min-width: unset;
                min-height: unset;
            }
        }


        .touch-button {
            position: absolute;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%) scale(var(--btn-scale, 1));
            transform-origin: center center;

            padding: 12px 12px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            color: #000;
            cursor: pointer;
            z-index: 10;
        }

        /* FLOOR PILL BASE */
      /* FLOOR PILL BASE */
        .floor-pill {
            position: fixed;
            top: 20px;
            right: 20px;
            /* FIXED */
            z-index: 9999;

            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 999px;
            padding: 8px 12px;

            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            font-family: sans-serif;
        }

        /* BUTTON */
        .floor-pill__trigger {
            color: #000000;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 999px;
            transition: background 0.3s;
        }

        .floor-pill__trigger:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* DROPDOWN */
        .floor-pill__list {
            position: absolute;
            top: 110%;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            transform-origin: top;

            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 12px;

            display: flex;
            flex-direction: column;
            gap: 8px;

            /* ✅ CONTROL SIZE HERE */
            width: 100px;
            /* fixed width */
            max-height: 220px;
            /* limit height */
            overflow-y: auto;
            /* scroll if too many items */

            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease;
        }

        /* OPEN STATE */
        .floor-pill.open .floor-pill__list {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }

        /* ITEMS */
        .floor-pill__item {
            color: #000000;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 14px;
            transition: background 0.25s;

            text-align: center;
            /* 👈 centers text */
            display: block;
            /* ensures full width clickable */
        }

        .floor-pill__item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ACTIVE */
        .floor-pill__item.active {
            background: rgba(201, 168, 124, 0.25);
            color: #c9a87c;
        }

        /* .button1 {

        .button4 {
            top: 59%;

        .touch-button:hover {
            background-color: #00649e;
            color: rgb(255, 255, 255);
        }

        .close-btn2 {
            position: fixed;
            top: 50px;
            left: 90px;
            width: 40px;
            height: 40px;
            background-color: #2c2c2c;
            border-radius: 12px;
            border: none;
            font-size: 20px;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s ease;
            z-index: 9999;
        }

        .close-btn2:hover {
            background-color: #444;
        }

        @media (max-width: 600px) {
            .close-btn2 {
                top: 50px;
                left: 30px;
            }

            .touch-button {
                --btn-scale: 0.75;
                font-size: 14px;
                padding: 10px 10px;
            }

        }


        /* quick, soft placeholder look */
        .blur-up {
            filter: blur(10px);
            transform: scale(1.02);
            transition: filter .45s ease, transform .45s ease, opacity .35s ease;
        }

        /* once the full image is in */
        .blur-up.is-loaded {
            filter: blur(0);
            transform: scale(1);
            opacity: 1;
        }
        .floor-badge {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 999px;
    padding: 10px 28px;
    font-family: sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #000000;
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    border: 1px solid rgba(201,168,124,0.3);
    white-space: nowrap;
    pointer-events: none;
}


        /* ── APT TOOLTIP ── */
        #aptTooltip {
            position: fixed;
            z-index: 99999;
            pointer-events: none;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.18s ease, transform 0.18s ease;
            background: #1a1a1a;
            border: 1px solid rgba(201,168,124,0.35);
            border-radius: 10px;
            padding: 10px 16px;
            font-family: sans-serif;
            color: #f0f0f0;
            white-space: nowrap;
            box-shadow: 0 8px 28px rgba(0,0,0,0.55);
        }
        #aptTooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }
        #aptTooltip .tt-bhk {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 3px;
        }
        #aptTooltip .tt-area {
            font-size: 13px;
            color: #aaaaaa;
        }
    
    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 600px) {
        #dock, .dock {
            width: 100vw !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            transform: none !important;
            border-radius: 0 !important;
            padding: 4px 0 !important;
            display: flex !important;
            justify-content: space-around !important;
            align-items: center !important;
        }
        .dock-item {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            flex: 1 !important;
            gap: 2px !important;
            padding: 4px 2px !important;
            transform: none !important;
            width: auto !important;
            height: auto !important;
        }
        .dock-icon, .dock-item img, .dock-item svg {
            width: 44px !important;
            height: 44px !important;
            min-width: 44px !important;
            min-height: 44px !important;
            max-width: 44px !important;
            max-height: 44px !important;
            transform: none !important;
        }
        .dock-item-label {
            display: block !important;
            font-size: 10px !important;
            color: #fff !important;
            text-align: center !important;
            margin-top: 2px !important;
        }
        .dock-item::after, .dock-item::before {
            display: none !important;
        }
        #lobby, .lobby {
            padding-bottom: 70px !important;
        }
        .close-btn, .close-btn2, #closeBtn, #closeBtn2 {
            width: 60px !important;
            height: 60px !important;
            font-size: 28px !important;
            top: 16px !important;
            left: 16px !important;
            position: fixed !important;
            z-index: 99999 !important;
        }
        #mobileAptPanel {
            display: none;
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 16px;
            z-index: 99998;
            border-radius: 12px 12px 0 0;
            font-size: 15px;
        }
        .apt-tooltip, .tooltip, [class*="tooltip"] {
            display: none !important;
        }
    }
</style>

                }, 800);
            });
        }
    });
});

    <script>
        // Mobile drag-to-pan (horizontal only)
        (function () {
            if (window.innerWidth > 600) return;
            const lobby = document.querySelector('.lobby-top');
            const wrapper = document.querySelector('.content-wrapper');
            if (!lobby || !wrapper) return;

            let isDragging = false;
            let startX = 0;
            let translateX = 0;

            function getImgWidth() {
                const img = wrapper.querySelector('img');
                return img ? img.offsetWidth : window.innerWidth;
            }

            function clamp(val, min, max) { return Math.min(Math.max(val, min), max); }

            function applyTransform() {
                const minX = -(getImgWidth() - window.innerWidth);
                translateX = clamp(translateX, minX, 0);
                wrapper.style.transform = `translateX(${translateX}px)`;
            }

            // Touch
            lobby.addEventListener('touchstart', e => {
                if (e.touches.length !== 1) return;
                isDragging = true;
                startX = e.touches[0].clientX - translateX;
                lobby.classList.add('dragging');
            }, { passive: true });

            lobby.addEventListener('touchmove', e => {
                if (!isDragging || e.touches.length !== 1) return;
                translateX = e.touches[0].clientX - startX;
                applyTransform();
            }, { passive: true });

            lobby.addEventListener('touchend', () => {
                isDragging = false;
                lobby.classList.remove('dragging');
            });

            // Mouse (desktop fallback)
            lobby.addEventListener('mousedown', e => {
                isDragging = true;
                startX = e.clientX - translateX;
                lobby.classList.add('dragging');
            });
            window.addEventListener('mousemove', e => {
                if (!isDragging) return;
                translateX = e.clientX - startX;
                applyTransform();
            });
            window.addEventListener('mouseup', () => {
                isDragging = false;
                lobby.classList.remove('dragging');
            });

            // Init: start centered
            window.addEventListener('load', () => {
                translateX = -((getImgWidth() - window.innerWidth) / 2);
                applyTransform();
            });
        })();
    </script>

    <script>
        (function () {
            const pill = document.getElementById('floorPill');
            const trigger = document.getElementById('floorTrigger');
            if (!pill || !trigger) return;

            trigger.addEventListener('click', function (e) {
                e.stopPropagation();
                pill.classList.toggle('open');
            });

            // close on outside click
            document.addEventListener('click', function (e) {
                if (!pill.contains(e.target)) {
                    pill.classList.remove('open');
                }
            });

            // prevent floor item clicks closing before nav
            document.querySelectorAll('.floor-pill__item').forEach(function (item) {
                item.addEventListener('click', function (e) {
                    e.stopPropagation();
                });
            });
        })();
    </script>




    <!-- APT HOVER TOOLTIP -->
    <div id="aptTooltip">
        <div class="tt-bhk" id="ttBhk">3 BHK</div>
        <div class="tt-area" id="ttArea">1800 sq ft</div>
    </div>

    <script>
    (function() {
        const tooltip = document.getElementById('aptTooltip');
        const ttBhk   = document.getElementById('ttBhk');
        const ttArea  = document.getElementById('ttArea');
        let mouseX = 0, mouseY = 0;

        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (tooltip.classList.contains('visible')) positionTooltip();
        });

        function positionTooltip() {
            const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
            let x = mouseX + 18, y = mouseY + 18;
            if (x + tw > window.innerWidth - 10)  x = mouseX - tw - 14;
            if (y + th > window.innerHeight - 10) y = mouseY - th - 14;
            tooltip.style.left = x + 'px';
            tooltip.style.top  = y + 'px';
        }

        document.querySelectorAll('.Cutout path').forEach(function(path) {
            const bhk  = path.getAttribute('data-bhk');
            const area = path.getAttribute('data-area');
            if (!bhk && !area) return;

            path.addEventListener('mouseenter', function() {
                ttBhk.textContent  = bhk  || '—';
                ttArea.textContent = area || '—';
                positionTooltip();
                tooltip.classList.add('visible');
            });

            path.addEventListener('mouseleave', function() {
                tooltip.classList.remove('visible');
            });
        });
    })();
    </script>
