<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Penthouse Tour</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/panolens@0.12.0/build/panolens.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap');

        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }

        #fadeOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity .5s ease;
            z-index: 9999;
        }

        #viewer {
            width: 100%;
            height: 100%;
        }

        /* ── Tour Nav (pill bar) ── */
        .tour-nav {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);

            display: flex;
            align-items: center;
            gap: 6px;

            padding: 6px;

            background: rgba(70, 70, 70, .35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 18px;

            z-index: 10000;
        }

        .tour-pill {
            display: flex;
            align-items: center;
            gap: 6px;

            height: 34px;
            padding: 0 12px;

            background: #2b2b2b;
            color: #fff;

            border: none;
            border-radius: 10px;

            font-family: 'Jost', sans-serif;
            font-size: 12px;
            font-weight: 500;

            cursor: pointer;
            white-space: nowrap;
            transition: .25s;
        }

        .tour-pill svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            display: block;
        }

        .tour-pill:hover {
            background: #353535;
            transform: translateY(-1px);
        }

        .tour-pill.active {
            background: #111;
        }

        /* ── Back Button ── */
        #backBtn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;

            border: none;
            border-radius: 30px;

            padding: 12px 20px;

            background: rgba(0, 0, 0, .5);
            color: white;

            backdrop-filter: blur(10px);

            cursor: pointer;
            font-size: 16px;
        }

        #backBtn:hover {
            background: white;
            color: black;
        }

        #roomInfoCard {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;

            font-family: 'Jost', sans-serif;
            text-align: right;

            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 14px 18px;

            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
        }

        #roomInfoCard.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        #roomInfoCard .hud-name {
            font-size: 30px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.02em;
            margin-bottom: 8px;
        }

        #roomInfoCard .hud-dims {
            font-size: 20px;
            font-weight: 500;
            color: rgba(255,255,255,0.80);
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }

        #roomInfoCard .hud-sqft {
            font-size: 18px;
            font-weight: 400;
            color: rgba(255,255,255,0.60);
            letter-spacing: 0.04em;
        }

        #roomInfoCard .hud-accent {
            color: #ffffff;
        }

    </style>
</head>

<body>

    <button id="backBtn">← Back</button>

    
    <div id="roomInfoCard">
        <div class="hud-name" id="cardName">Room</div>
        <div class="hud-dims">
            <span id="cardLength">0</span><span class="hud-accent"> ft</span>
            &nbsp;×&nbsp;
            <span id="cardWidth">0</span><span class="hud-accent"> ft</span>
        </div>
        <div class="hud-sqft"><span id="cardSqft">0</span> sq ft</div>
    </div>

    <div id="viewer"></div>

    <!-- Bottom panel with room navigation pills -->
    <div class="tour-nav" id="tourNav">

        <button class="tour-pill active" onclick="goToRoom('dinning', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M6 4V10" stroke="currentColor" stroke-width="1.8" />
                <path d="M4 7H8" stroke="currentColor" stroke-width="1.8" />
                <path d="M6 10V20" stroke="currentColor" stroke-width="1.8" />
                <path d="M17 4V20" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Dining</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('kitchen', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <rect x="5" y="5" width="14" height="14" stroke="currentColor" stroke-width="1.8" />
                <path d="M8 9H16" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Kitchen</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('lower_lobby_1', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 10L12 4L20 10V20H4V10Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                <path d="M9 20V14H15V20" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Lower Lobby 1</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('lower_room_1', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M3 12V8H21V12" stroke="currentColor" stroke-width="1.8" />
                <path d="M3 12H21V20H3V12Z" stroke="currentColor" stroke-width="1.8" />
                <path d="M7 20V16" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Kid's Room</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('lower_room_2', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M3 12V8H21V12" stroke="currentColor" stroke-width="1.8" />
                <path d="M3 12H21V20H3V12Z" stroke="currentColor" stroke-width="1.8" />
                <path d="M17 20V16" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Master Bedroom</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('upper_lobby_2', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 14L12 8L20 14V20H4V14Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                <path d="M9 20V16H15V20" stroke="currentColor" stroke-width="1.8" />
                <path d="M12 4V8" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Upper Lobby 2</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('upper_room_1', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M3 11V7H21V11" stroke="currentColor" stroke-width="1.8" />
                <path d="M3 11H21V19H3V11Z" stroke="currentColor" stroke-width="1.8" />
                <path d="M7 7L12 3L17 7" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
            </svg>
            <span>Guest room</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('upper_room_2', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M3 11V7H21V11" stroke="currentColor" stroke-width="1.8" />
                <path d="M3 11H21V19H3V11Z" stroke="currentColor" stroke-width="1.8" />
                <path d="M7 7L12 3L17 7" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                <path d="M17 19V15" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Guest room</span>
        </button>
               <button class="tour-pill" onclick="goToRoom('balcony', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M3 11V7H21V11" stroke="currentColor" stroke-width="1.8" />
                <path d="M3 11H21V19H3V11Z" stroke="currentColor" stroke-width="1.8" />
                <path d="M7 7L12 3L17 7" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                <path d="M17 19V15" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Balcony</span>
        </button>

    </div>
 
    

    <script>

        const selectedFloor =
            sessionStorage.getItem("selectedFloor") || "01";

        function createArrowSVG() {
            const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
    <defs>
      <radialGradient id="glassFill" cx="50%" cy="40%" r="60%">
        <stop offset="0%"  stop-color="rgba(255,255,255,0.28)"/>
        <stop offset="55%" stop-color="rgba(255,255,255,0.10)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
      </radialGradient>
      <linearGradient id="glassHighlight" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"  stop-color="rgba(255,255,255,0.35)"/>
        <stop offset="45%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
      <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
        <feOffset dx="0" dy="2" result="offsetblur"/>
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.45"/>
        </feComponentTransfer>
        <feMerge>
          <feMergeNode/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <radialGradient id="dotFill" cx="50%" cy="45%" r="50%">
        <stop offset="0%"  stop-color="#123a8a"/>
        <stop offset="100%" stop-color="#0A1F44"/>
      </radialGradient>
    </defs>
    <g filter="url(#softShadow)">
      <circle cx="64" cy="64" r="44"
              fill="url(#glassFill)"
              stroke="rgba(255,255,255,0.22)"
              stroke-width="1.2"/>
      <circle cx="64" cy="64" r="44"
              fill="url(#glassHighlight)"
              opacity="0.9"/>
      <circle cx="64" cy="64" r="38"
              fill="none"
              stroke="rgba(255,255,255,0.08)"
              stroke-width="1"/>
    </g>
    <circle cx="64" cy="64" r="6.5" fill="url(#dotFill)"/>
 <circle cx="64" cy="64" r="14" fill="#3b3b3b"/>
  </svg>`;

            return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
        }

        const ARROW_ICON = createArrowSVG();

        const viewer = new PANOLENS.Viewer({
            container: document.getElementById("viewer"),
            controlBar: false
        });
        viewer.camera.fov = 100;
        viewer.camera.updateProjectionMatrix();

        const rooms = {
            kitchen: new PANOLENS.ImagePanorama("images/kitchen.jpg"),
            lower_lobby_1: new PANOLENS.ImagePanorama("images/lower-lobby-1.jpg"),
            dinning: new PANOLENS.ImagePanorama("images/dinning.jpg"),
            lower_room_1: new PANOLENS.ImagePanorama("images/lower-room-1.jpg"),
            lower_room_2: new PANOLENS.ImagePanorama("images/lower-room-2.jpg"),
            upper_lobby_2: new PANOLENS.ImagePanorama("images/upper-lobby-2.jpg"),
            upper_room_1: new PANOLENS.ImagePanorama("images/upper-room-1.jpg"),
            upper_room_2: new PANOLENS.ImagePanorama("images/upper-room-2.jpg"),
            
balcony: new PANOLENS.ImagePanorama(
                `../../Balcony/360/Tower_B/images/Balcony_${selectedFloor}.jpg`
            )


        };

        Object.values(rooms).forEach(p => viewer.add(p));
        Object.values(rooms).forEach(room => { room.fadeDuration = 1200; });

        function lookAtYaw(yaw, pitch = 0) {
            const r = 5000;
            const phi = THREE.MathUtils.degToRad(90 - pitch);
            const theta = THREE.MathUtils.degToRad(yaw);
            viewer.tweenControlCenter(
                new THREE.Vector3(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.cos(phi),
                    r * Math.sin(phi) * Math.sin(theta)
                )
            );
        }

        function addHotspot(from, to, yaw, pitch, text) {
            const spot = new PANOLENS.Infospot(500, ARROW_ICON);
            const r = 5000;
            const phi = THREE.MathUtils.degToRad(90 - pitch);
            const theta = THREE.MathUtils.degToRad(yaw);
            spot.position.set(
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            );
            spot.addHoverText(text);
            spot.addEventListener("click", () => {
                const overlay = document.getElementById("fadeOverlay");
                viewer.tweenControlCenter(spot.position);
                setTimeout(() => {
                    let fov = viewer.camera.fov;
                    function zoom() {
                        if (fov > 60) {
                            fov -= 1.2;
                            viewer.camera.fov = fov;
                            viewer.camera.updateProjectionMatrix();
                            requestAnimationFrame(zoom);
                        } else {
                            overlay.style.opacity = 0.25;
                            viewer.setPanorama(rooms[to]);
                            viewer.camera.fov = 100;
                            viewer.camera.updateProjectionMatrix();
                            setTimeout(() => { overlay.style.opacity = 0; }, 300);
                            showInfoCard(to);
                        }
                    }
                    zoom();Guest
                }, 400);
            });
            rooms[from].add(spot);
        }


        const roomData = {
            dinning:      { name: "Dining Room",     L: 14, W: 21 },
            kitchen:      { name: "Kitchen",          L: 8, W: 11 },
            lower_lobby_1: { name: "Lower Lobby 1",  L: 21, W: 14 },
            lower_room_1: { name: "Kid's Room",       L: 11, W: 15 },
            lower_room_2: { name: "Master Bedroom",   L: 11, W: 14 },
            upper_lobby_2: { name: "Upper Lobby 2",   L: 21, W: 14 },
            upper_room_1: { name: "Guest Room",       L: 15, W: 11 },
            upper_room_2: { name: "Guest Room 2",     L: 14, W: 11 },
        };

        function showInfoCard(roomKey) {
            const data = roomData[roomKey];
            const card = document.getElementById("roomInfoCard");
            if (!data) { card.classList.remove("visible"); return; }

            const sqft = (data.L * data.W).toFixed(2);

            document.getElementById("cardName").textContent   = data.name;
            document.getElementById("cardLength").textContent = data.L;
            document.getElementById("cardWidth").textContent  = data.W;
            document.getElementById("cardSqft").textContent   = sqft;

            card.classList.remove("visible");
            setTimeout(() => card.classList.add("visible"), 80);
        }

        function goToRoom(roomName, btn) {
            // Update active pill
            document.querySelectorAll('.tour-pill').forEach(p => p.classList.remove('active'));
            if (btn) btn.classList.add('active');

            const overlay = document.getElementById("fadeOverlay");
            overlay.style.opacity = 0.25;
            setTimeout(() => {
                viewer.setPanorama(rooms[roomName]);
                viewer.camera.fov = 100;
                viewer.camera.updateProjectionMatrix();
                overlay.style.opacity = 0;
                        showInfoCard(roomName);
        }, 300);
        }

        // Hotspots
        addHotspot("lower_lobby_1", "dinning", 125, -5, "Dining");
        addHotspot("lower_lobby_1", "lower_room_1", -67, -3, "kid's room");
        addHotspot("lower_lobby_1", "lower_room_2", 110, -3, "Master Bedroom");
        addHotspot("lower_lobby_1", "kitchen", -165, -3, "kitchen");




        addHotspot("kitchen", "dinning", 600, -5, "Dining");
        addHotspot("kitchen", "lower_room_2", -130, -3, "Master Bedroom");
        addHotspot("kitchen", "lower_room_1", 110, -3, "kid's room");
        addHotspot("kitchen", "lower_lobby_1", -195, -3, "lobby");


        addHotspot("dinning", "kitchen", -425, -2, "kitchen");
        addHotspot("dinning", "lower_room_2", -184, -3, "Master Bedroom");
        addHotspot("dinning", "lower_room_1", -14, -3, "Kid's room");
        addHotspot("dinning", "lower_lobby_1", 40, -3, "lobby");


        addHotspot("lower_room_1", "lower_lobby_1", -75, -3, "lobby")

        addHotspot("lower_room_2", "lower_lobby_1", 65, -3, "lobby")



        addHotspot("upper_lobby_2", "upper_room_1", -55, -3, "Guest Room")
        addHotspot("upper_lobby_2", "upper_room_2", 105, -3, "Guest Room")


        addHotspot("upper_room_2", "upper_lobby_2", 140, -3, "Lobby")


        addHotspot("upper_room_1", "upper_lobby_2", 145, -3, "Lobby")
        


        
         addHotspot("lower_room_1", "balcony", -210, -3, "Balcony")


           addHotspot("lower_room_2", "balcony", 155, -3, "Balcony")

            addHotspot("upper_room_1", "balcony", 55, -3, "Balcony")
             addHotspot("upper_room_2", "balcony", -93, -3, "Balcony")


             addHotspot("balcony", "lower_room_1", 133, -3, "Master Bedroom")
        
         viewer.setPanorama(rooms.lower_lobby_1);

        document.getElementById("backBtn").addEventListener("click", () => {
            window.history.back();
        });

        // Show info card for initial room
        showInfoCard('lower_lobby_1');
    </script>

    <div id="fadeOverlay"></div>

</body>

</html>
