  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&family=Poppins:wght@500;600&display=swap');

/* ===========================
   LUXURY COMPASS NAVIGATION
   =========================== */
.tour-pill svg{
    width:16px;
    height:16px;
    flex-shrink:0;
    display:block;
}

.tour-pill{
    height:36px;
    padding:0 12px;
    gap:6px;
    font-size:12px;
}
.tour-nav{
    position:fixed;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);

    display:flex;
    align-items:center;
    gap:6px;

    padding:6px;

    background:rgba(70,70,70,.35);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;

    z-index:99999;
}

.tour-pill{
    display:flex;
    align-items:center;
    gap:6px;

    height:34px;
    padding:0 12px;

    background:#2b2b2b;
    color:#fff;

    text-decoration:none;

    border-radius:10px;

    font-family:'Jost',sans-serif;
    font-size:12px;
    font-weight:500;

    transition:.25s;
}

.tour-pill:hover{
    background:#353535;
    transform:translateY(-1px);
}

.tour-pill.active{
    background:#111;
}

.tour-pill img{
    width:12px;
    height:12px;
    object-fit:contain;
}

.tour-pill span{
    white-space:nowrap;
    line-height:1;
}

.compass-nav{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);

    width:180px;
    height:160px;

    z-index:99999;
    pointer-events:none;
}

/* CONNECTOR LINES */

.compass-nav::before{
    content:'';
    position:absolute;

    left:50%;
    top:50%;

    width:1px;
    height:90px;

    background:rgba(255,255,255,.25);

    transform:translate(-50%,-50%);
}

.compass-nav::after{
    content:'';
    position:absolute;

    left:50%;
    top:50%;

    width:90px;
    height:1px;

    background:rgba(255,255,255,.25);

    transform:translate(-50%,-50%);
}

/* ROOM NODES */

.compass-node{
    position:absolute;

    width:56px;
    height:56px;

    display:flex;
    align-items:center;
    justify-content:center;

    text-decoration:none;

    background:rgba(0,0,0,.50);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);
    border-radius:50%;

    color:#fff;

    font-family:'Jost',sans-serif;
    font-size:9px;
    font-weight:500;

    letter-spacing:1px;
    text-transform:uppercase;

    box-shadow:
        0 8px 20px rgba(0,0,0,.25),
        inset 0 1px 0 rgba(255,255,255,.08);

    transition:all .25s ease;

    pointer-events:auto;
}

.compass-node:hover{
    transform:scale(1.1);

    background:rgba(0,0,0,.70);

    border-color:rgba(255,255,255,.30);

    box-shadow:
        0 12px 30px rgba(0,0,0,.35);
}

/* ACTIVE ROOM */

.compass-center{
    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    width:72px;
    height:72px;

    border-radius:50%;

    background:rgba(0,0,0,.90);

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    color:#fff;

    font-family:'Jost',sans-serif;
    font-size:10px;
    font-weight:600;

    letter-spacing:1px;
    text-transform:uppercase;

    box-shadow:
        0 12px 35px rgba(0,0,0,.40);

    pointer-events:auto;
}

/* CENTER DOT */

.dot{
    width:10px;
    height:10px;

    border-radius:50%;

    background:#fff;

    margin-bottom:6px;
}

/* PULSE */

.pulse{
    position:absolute;

    width:72px;
    height:72px;

    border-radius:50%;

    border:1px solid rgba(255,255,255,.20);

    animation:pulseRing 3s infinite;
}

@keyframes pulseRing{

    0%{
        transform:scale(1);
        opacity:.8;
    }

    100%{
        transform:scale(1.45);
        opacity:0;
    }

}

/* POSITIONS */

.top{
    top:0;
    left:50%;
    transform:translateX(-50%);
}

.left{
    left:0;
    top:50%;
    transform:translateY(-50%);
}

.right{
    right:0;
    top:50%;
    transform:translateY(-50%);
}

.bottom{
    bottom:0;
    left:50%;
    transform:translateX(-50%);
}

/* MOBILE */

@media(max-width:768px){

    .compass-nav{
        width:165px;
        height:145px;

    .compass-node{

    .compass-center{
        width:64px;
        height:64px;
        font-size:9px;
    }

    .pulse{
        width:64px;
        height:64px;
    }

   function createArrowSVG() {
  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
    <defs>
      <!-- Glass morph gradient (simulates frosted glass depth) -->
      <radialGradient id="glassFill" cx="50%" cy="40%" r="60%">
        <stop offset="0%"  stop-color="rgba(255,255,255,0.28)"/>
        <stop offset="55%" stop-color="rgba(255,255,255,0.10)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
      </radialGradient>

      <!-- Top inner highlight (subtle gloss) -->
      <linearGradient id="glassHighlight" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"  stop-color="rgba(255,255,255,0.35)"/>
        <stop offset="45%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>

      <!-- Soft outer shadow for depth on dark backgrounds -->
      <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
        <feOffset dx="0" dy="2" result="offsetblur"/>
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.45"/>
        </feComponentTransfer>
        <feMerge>
          <feMergeNode/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <!-- Inner dot subtle glow -->
      <radialGradient id="dotFill" cx="50%" cy="45%" r="50%">
        <stop offset="0%"  stop-color="#123a8a"/>
        <stop offset="100%" stop-color="#0A1F44"/>
      </radialGradient>
    </defs>

    <!-- Outer glass circle -->
    <g filter="url(#softShadow)">
      <circle cx="64" cy="64" r="44"
              fill="url(#glassFill)"

      <!-- Gloss highlight arc (top portion only) -->

      <circle cx="64" cy="64" r="38"

              stroke-width="1"/>

    <!-- Inner core dot -->
    <circle cx="64" cy="64" r="6.5" fill="url(#dotFill)"/>
    <!-- Tiny specular on the dot -->
    <circle cx="62.5" cy="62" r="1.6" fill="rgba(255,255,255,0.55)"/>
  </svg>`;

  return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
}

  <script>
    // 1) Define both images
    // const LOW_SRC = "./../../../images/Thumbnail/Apartments/3BHK/360/Kitchen.webp";
    const LOW_SRC = "images/kitchen.webp";
    const HIGH_SRC = "images/kitchen.jpg";

    const imageContainer = document.querySelector(".image-container");

    // 2) Create panoramas
    const panoLow = new PANOLENS.ImagePanorama(LOW_SRC);
    const panoHigh = new PANOLENS.ImagePanorama(HIGH_SRC);

    // 3) Viewer
    const viewer = new PANOLENS.Viewer({
      container: imageContainer,
      autoRotate: false,
      autoRotateSpeed: 0.1,
      controlBar: false,
      cameraFov: 80
    });

    // after: const viewer = new PANOLENS.Viewer({...});
    let didInitView = false;

    // Keep the same initial yaw on both (texture yaw)
    const TEXTURE_YAW = -Math.PI / 2 + 0; // your existing value
    panoLow.rotation.y = TEXTURE_YAW;
    panoHigh.rotation.y = TEXTURE_YAW;

    // Desired tilt DOWN amount (pitch)
    const TILT_DOWN = Math.PI / 50; // ~16°

    function setInitialViewAndLockPitch() {
      if (didInitView) return;   // ✅ run only once (prevents flicker on swap)
      didInitView = true;

      const controls = viewer.getControl();

      // Positive value here, we pass -TILT to tilt DOWN
      const TILT = -Math.PI / 40;     // adjust how much you want to tilt
      controls.rotateUp(-TILT);      // tilt down

      // No vertical limits (free up/down)
      if ('minPolarAngle' in controls && 'maxPolarAngle' in controls) {
        controls.minPolarAngle = 0;          // can look straight up
        controls.maxPolarAngle = Math.PI;    // can look straight down
      }

      // Optional: rotation only (no panning)
      if ('enablePan' in controls) controls.enablePan = false;
    }


    // Apply same camera view when each pano becomes active
    panoLow.addEventListener('enter', setInitialViewAndLockPitch);
    panoHigh.addEventListener('enter', setInitialViewAndLockPitch);

    // Start with low; add both to viewer for smooth swap
    viewer.add(panoLow);
    viewer.add(panoHigh);
    viewer.setPanorama(panoLow);


    function degToRad(deg) {
      return deg * Math.PI / 180;
    }

    function setFromAngles(spot, yawDeg, pitchDeg, radius = 5000) {
      const yaw = degToRad(yawDeg);
      const pitch = degToRad(pitchDeg);

      const x = radius * Math.cos(pitch) * Math.sin(yaw);
      const y = radius * Math.sin(pitch);
      const z = radius * Math.cos(pitch) * Math.cos(yaw);

      spot.position.set(x, y, z);
    }

   <script>
(function(){
  const items     = document.querySelectorAll('.dock-item');
  const dockItems = document.getElementById('dockItems');
  if (!dockItems || !items.length) return;

  const BASE = 44, MAX = 66, RANGE = 130;

  function magnify(e) {
    items.forEach(item => {
      const icon  = item.querySelector('.dock-icon');
      const svg   = item.querySelector('.dock-icon svg');
      const label = item.querySelector('.dock-label');
      if (!icon) return;
      const rect = item.getBoundingClientRect();
      const cx   = rect.left + rect.width / 2;
      const dist = Math.abs(e.clientX - cx);
      if (dist < RANGE) {
        const t  = 1 - dist / RANGE;
        const sz = BASE + (MAX - BASE) * t;
        icon.style.width        = sz + 'px';
        icon.style.height       = sz + 'px';
        icon.style.borderRadius = (14 + t * 6) + 'px';
        svg.style.width  = (20 + t * 8) + 'px';
        svg.style.height = (20 + t * 8) + 'px';
        item.style.width = sz + 'px';
        if (t > 0.65) {
          icon.style.background  = 'rgba(0,0,0,0.08)';
          icon.style.borderColor = 'rgba(0,0,0,0.18)';
          icon.style.boxShadow   = '0 4px 16px rgba(0,0,0,0.10)';
          svg.style.stroke       = '#000000';
          svg.style.filter       = 'drop-shadow(0 0 4px rgba(0,0,0,0.18))';
          if (label) { label.style.opacity = '1'; label.style.translate = '0 0'; }
        } else { reset(icon, svg, label); }
      } else {
        icon.style.width = icon.style.height = BASE + 'px';
        icon.style.borderRadius = '14px';
        svg.style.width = svg.style.height = '20px';
        item.style.width = BASE + 'px';
        reset(icon, svg, label);
      }
    });
  }

  function reset(icon, svg, label) {
    icon.style.background = icon.style.borderColor = icon.style.boxShadow = '';
    svg.style.stroke = svg.style.filter = '';
    if (label) { label.style.opacity = '0'; label.style.translate = '0 4px'; }
  }

  function resetAll() {
    items.forEach(item => {
      const icon  = item.querySelector('.dock-icon');
      const svg   = item.querySelector('.dock-icon svg');
      const label = item.querySelector('.dock-label');
      if (!icon) return;
      icon.style.width = icon.style.height = icon.style.borderRadius = '';
      svg.style.width  = svg.style.height  = '';
      item.style.width = '';
      reset(icon, svg, label);
    });
  }

  dockItems.addEventListener('mousemove', magnify);
  dockItems.addEventListener('mouseleave', resetAll);

  items.forEach(c => {
    c.addEventListener('click', e => {
      c.classList.add('is-bouncing');
      c.addEventListener('animationend', () => c.classList.remove('is-bouncing'), { once: true });
      const r = document.createElement('span');
      r.className = 'dock-ripple';
      const icon = c.querySelector('.dock-icon');
      const b = icon.getBoundingClientRect();
      const s = Math.max(b.width, b.height);
      r.style.width = r.style.height = s + 'px';
      r.style.left  = (e.clientX - b.left - s / 2) + 'px';
      r.style.top   = (e.clientY - b.top  - s / 2) + 'px';
      icon.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    });
  });
})();
</script>
