<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Typical Tour</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/panolens@0.12.0/build/panolens.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap');

        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }

        #fadeOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity .5s ease;
            z-index: 9999;
        }

        #viewer {
            width: 100%;
            height: 100%;
        }

        /* ── Tour Nav (pill bar) ── */
        .tour-nav {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);

            display: flex;
            align-items: center;
            gap: 6px;

            padding: 6px;

            background: rgba(70, 70, 70, .35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 18px;

            z-index: 10000;
        }

        .tour-pill {
            display: flex;
            align-items: center;
            gap: 6px;

            height: 34px;
            padding: 0 12px;

            background: #2b2b2b;
            color: #fff;

            border: none;
            border-radius: 10px;

            font-family: 'Jost', sans-serif;
            font-size: 12px;
            font-weight: 500;

            cursor: pointer;
            white-space: nowrap;
            transition: .25s;
        }

        .tour-pill svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            display: block;
        }

        .tour-pill:hover {
            background: #353535;
            transform: translateY(-1px);
        }

        .tour-pill.active {
            background: #111;
        }

        /* ── Back Button ── */
        #backBtn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;

            border: none;
            border-radius: 30px;

            padding: 12px 20px;

            background: rgba(0, 0, 0, .5);
            color: white;

            backdrop-filter: blur(10px);

            cursor: pointer;
            font-size: 16px;
        }

        #backBtn:hover {
            background: white;
            color: black;
        }

        #roomInfoCard {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;

            font-family: 'Jost', sans-serif;
            text-align: right;

            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 14px 18px;

            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
        }

        #roomInfoCard.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        #roomInfoCard .hud-name {
            font-size: 30px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.02em;
            margin-bottom: 8px;
        }

        #roomInfoCard .hud-dims {
            font-size: 20px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.80);
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }

        #roomInfoCard .hud-sqft {
            font-size: 18px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.60);
            letter-spacing: 0.04em;
        }

        #roomInfoCard .hud-accent {
            color: #ffffff;
        }













        /* ── Floor Pill (vertical: ▲ · Floor 01 · ▼) ── */
        #balconyControls {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            z-index: 10001;
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(15, 15, 15, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
            padding: 6px;
            gap: 0;
            overflow: hidden;
        }

        #balconyControls .floor-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 14px;
            background: transparent;
            color: rgba(255,255,255,0.75);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s, color .2s;
            flex-shrink: 0;
        }

        #balconyControls .floor-btn:hover {
            background: rgba(255,255,255,0.13);
            color: #fff;
        }

        #balconyControls .floor-btn svg {
            width: 16px;
            height: 16px;
            display: block;
        }

        #floorIndicator {
            font-family: 'Jost', sans-serif;
            font-size: 10px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.08em;
            text-align: center;
            padding: 10px 0;
            width: 44px;
            border-top: 1px solid rgba(255,255,255,0.09);
            border-bottom: 1px solid rgba(255,255,255,0.09);
            display: block;
            line-height: 1.5;
            text-transform: uppercase;
        }
    </style>
</head>

<body>


    <!-- Floor Pill -->
    <div id="balconyControls">
        <button class="floor-btn" id="floorUpBtn" title="Floor Up">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 15L12 9L18 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <div id="floorIndicator">FL<br>01</div>
        <button class="floor-btn" id="floorDownBtn" title="Floor Down">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>






    <button id="backBtn">← Back</button>

    <div id="roomInfoCard">
        <div class="hud-name" id="cardName">Room</div>
        <div class="hud-dims">
            <span id="cardLength">0</span><span class="hud-accent"> L</span>
            &nbsp;×&nbsp;
            <span id="cardWidth">0</span><span class="hud-accent"> W</span>
        </div>
        <div class="hud-sqft"><span id="cardSqft">0</span> sq ft</div>
    </div>

    <div id="viewer"></div>

    <!-- Bottom panel with room navigation pills -->
    <div class="tour-nav" id="tourNav">

        <button class="tour-pill active" onclick="goToRoom('lobby', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 10L12 4L20 10V20H4V10Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
            </svg>
            <span>Lobby</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('dinning', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M6 4V10" stroke="currentColor" stroke-width="1.8" />
                <path d="M4 7H8" stroke="currentColor" stroke-width="1.8" />
                <path d="M6 10V20" stroke="currentColor" stroke-width="1.8" />
                <path d="M17 4V20" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Dinning</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('kitchen', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <rect x="5" y="5" width="14" height="14" stroke="currentColor" stroke-width="1.8" />
                <path d="M8 9H16" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Kitchen</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('room_1', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M3 12V8H21V12" stroke="currentColor" stroke-width="1.8" />
                <path d="M3 12H21V20H3V12Z" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Master Room</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('room_2', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M3 12V8H21V12" stroke="currentColor" stroke-width="1.8" />
                <path d="M3 12H21V20H3V12Z" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Bedroom 2</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('room_3', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M3 12V8H21V12" stroke="currentColor" stroke-width="1.8" />
                <path d="M3 12H21V20H3V12Z" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Bedroom 3</span>
        </button>

        <button class="tour-pill" onclick="goToRoom('balcony', this)">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M3 12V8H21V12" stroke="currentColor" stroke-width="1.8" />
                <path d="M3 12H21V20H3V12Z" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Balcony</span>
        </button>

    </div>

    <script>

        const selectedFloor =
            sessionStorage.getItem("selectedFloor") || "01";




        function createArrowSVG() {
            const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
    <defs>
      <!-- Glass morph gradient (simulates frosted glass depth) -->
      <radialGradient id="glassFill" cx="50%" cy="40%" r="60%">
        <stop offset="0%"  stop-color="rgba(255,255,255,0.28)"/>
        <stop offset="55%" stop-color="rgba(255,255,255,0.10)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
      </radialGradient>

      <!-- Top inner highlight (subtle gloss) -->
      <linearGradient id="glassHighlight" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"  stop-color="rgba(255,255,255,0.35)"/>
        <stop offset="45%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>

      <!-- Soft outer shadow for depth on dark backgrounds -->
      <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
        <feOffset dx="0" dy="2" result="offsetblur"/>
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.45"/>
        </feComponentTransfer>
        <feMerge>
          <feMergeNode/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <!-- Inner dot subtle glow -->
      <radialGradient id="dotFill" cx="50%" cy="45%" r="50%">
        <stop offset="0%"  stop-color="#123a8a"/>
        <stop offset="100%" stop-color="#0A1F44"/>
      </radialGradient>
    </defs>

    <!-- Outer glass circle -->
    <g filter="url(#softShadow)">
      <circle cx="64" cy="64" r="44"
              fill="url(#glassFill)"
              stroke="rgba(255,255,255,0.22)"
              stroke-width="1.2"/>
      <!-- Gloss highlight arc (top portion only) -->
      <circle cx="64" cy="64" r="44"
              fill="url(#glassHighlight)"
              opacity="0.9"/>
      <!-- Faint inner ring for premium depth -->
      <circle cx="64" cy="64" r="38"
              fill="none"
              stroke="rgba(255,255,255,0.08)"
              stroke-width="1"/>
    </g>

    <!-- Inner core dot -->
    <circle cx="64" cy="64" r="6.5" fill="url(#dotFill)"/>
    <!-- Tiny specular on the dot -->
 <circle cx="64" cy="64" r="14" fill="#3b3b3b"/>
  </svg>`;

            return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
        }

        const ARROW_ICON = createArrowSVG();

        // Read room from URL
        const params = new URLSearchParams(window.location.search);
        const initialRoom = params.get("room") || "lobby";



        const viewer = new PANOLENS.Viewer({
            container: document.getElementById("viewer"),
            controlBar: false
        });
        viewer.camera.fov = 100;
        viewer.camera.updateProjectionMatrix();

        const rooms = {
            lobby: new PANOLENS.ImagePanorama("images/lobby.jpg"),
            dinning: new PANOLENS.ImagePanorama("images/dinning.jpg"),
            room_1: new PANOLENS.ImagePanorama("images/room-1.jpg"),
            room_2: new PANOLENS.ImagePanorama("images/room-2.jpg"),
            room_3: new PANOLENS.ImagePanorama("images/room-3.jpg"),
            kitchen: new PANOLENS.ImagePanorama("images/kitchen.jpg"),
            // balcony: new PANOLENS.ImagePanorama(
            //     `../../Balcony/360/Tower_B/images/Balcony_${selectedFloor}.jpg`
            // )


        };




        let currentBalconyFloor = parseInt(selectedFloor);

        function createBalconyPanorama(floor) {
            return new PANOLENS.ImagePanorama(
                `../../Balcony/360/Tower_B/images/Balcony_${String(floor).padStart(2, '0')}.jpg`
            );
        }

        rooms.balcony = createBalconyPanorama(currentBalconyFloor);
        viewer.add(rooms.balcony);

        function changeBalconyFloor(direction) {

            let nextFloor = currentBalconyFloor + direction;

            if (nextFloor < 1) return;
            if (nextFloor > 17) return; // adjust max floor

            currentBalconyFloor = nextFloor;
            updateFloorIndicator();

            const panorama = createBalconyPanorama(currentBalconyFloor);

            viewer.add(panorama);

            rooms.balcony = panorama;

            viewer.setPanorama(panorama);


            addBalconyHotspots(panorama);

            viewer.add(panorama);

            rooms.balcony = panorama;

            viewer.setPanorama(panorama);

        }
        document.getElementById("floorUpBtn")
            .addEventListener("click", () => {
                changeBalconyFloor(1);
            });

        document.getElementById("floorDownBtn")
            .addEventListener("click", () => {
                changeBalconyFloor(-1);
            });

        function updateBalconyControls(roomName) {

            const controls = document.getElementById("balconyControls");

            if (roomName === "balcony") {
                controls.style.display = "flex";
            } else {
                controls.style.display = "none";
            }

        }
        function addBalconyHotspots(panorama) {

            const spot = new PANOLENS.Infospot(500, ARROW_ICON);

            const yaw = 130;
            const pitch = -6;

            const r = 5000;
            const phi = THREE.MathUtils.degToRad(90 - pitch);
            const theta = THREE.MathUtils.degToRad(yaw);

            spot.position.set(
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            );

            spot.addHoverText("Master Bedroom");

            spot.addEventListener("click", () => {
                viewer.setPanorama(rooms.room_1);
                updateBalconyControls("room_1");
            });

            panorama.add(spot);
        }
        function updateFloorIndicator() {
            const indicator = document.getElementById("floorIndicator");
            indicator.innerHTML = `FL<br>${String(currentBalconyFloor).padStart(2, '0')}`;
        }

        function updateBalconyControls(roomName) {

            const controls = document.getElementById("balconyControls");
            const indicator = document.getElementById("floorIndicator");

            if (roomName === "balcony") {

                controls.style.display = "flex";
                indicator.style.display = "block";

                updateFloorIndicator();

            } else {

                controls.style.display = "none";
                indicator.style.display = "none";

            }
        }






























        Object.values(rooms).forEach(p => viewer.add(p));
        Object.values(rooms).forEach(room => { room.fadeDuration = 1200; });

        function lookAtYaw(yaw, pitch = 0) {
            const r = 5000;
            const phi = THREE.MathUtils.degToRad(90 - pitch);
            const theta = THREE.MathUtils.degToRad(yaw);
            viewer.tweenControlCenter(
                new THREE.Vector3(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.cos(phi),
                    r * Math.sin(phi) * Math.sin(theta)
                )
            );
        }

        function addHotspot(from, to, yaw, pitch, text) {
            const spot = new PANOLENS.Infospot(500, ARROW_ICON);
            const r = 5000;
            const phi = THREE.MathUtils.degToRad(90 - pitch);
            const theta = THREE.MathUtils.degToRad(yaw);
            spot.position.set(
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            );
            spot.addHoverText(text);
            spot.addEventListener("click", () => {
                const overlay = document.getElementById("fadeOverlay");
                viewer.tweenControlCenter(spot.position);
                setTimeout(() => {
                    let fov = viewer.camera.fov;
                    function zoom() {
                        if (fov > 60) {
                            fov -= 1.2;
                            viewer.camera.fov = fov;
                            viewer.camera.updateProjectionMatrix();
                            requestAnimationFrame(zoom);
                        } else {
                            overlay.style.opacity = 0.25;
                            viewer.setPanorama(rooms[to]);
                            viewer.camera.fov = 100;
                            viewer.camera.updateProjectionMatrix();
                            setTimeout(() => { overlay.style.opacity = 0; }, 300);
                            showInfoCard(to);
                        }
                    }
                    zoom();
                }, 400);
            });
            rooms[from].add(spot);
        }

        const roomData = {
            lobby: { name: "Lobby", L: 21, W: 14 },
            dinning: { name: "Dining Room", L: 21, W: 14 },
            kitchen: { name: "Kitchen", L: 11, W: 8 },
            room_1: { name: "Master Bedroom", L: 15, W: 11 },
            room_2: { name: "Kid's Room", L: 14, W: 11 },
            room_3: { name: "Guest's Room", L: 15, W: 12 },

        };

        function showInfoCard(roomKey) {
            const data = roomData[roomKey];
            const card = document.getElementById("roomInfoCard");
            if (!data) { card.classList.remove("visible"); return; }

            const sqft = (data.L * data.W).toFixed(2);

            document.getElementById("cardName").textContent = data.name;
            document.getElementById("cardLength").textContent = data.L;
            document.getElementById("cardWidth").textContent = data.W;
            document.getElementById("cardSqft").textContent = sqft;

            card.classList.remove("visible");
            setTimeout(() => card.classList.add("visible"), 80);
        }

        function goToRoom(roomName, btn) {

            document.querySelectorAll('.tour-pill')
                .forEach(p => p.classList.remove('active'));

            if (btn) btn.classList.add('active');

            const overlay = document.getElementById("fadeOverlay");

            overlay.style.opacity = 0.25;

            setTimeout(() => {

                viewer.setPanorama(rooms[roomName]);

                viewer.camera.fov = 100;
                viewer.camera.updateProjectionMatrix();

                overlay.style.opacity = 0;

                showInfoCard(roomName);

                updateBalconyControls(roomName); // ADD THIS

            }, 300);
        }
        if (rooms[initialRoom]) {

            viewer.setPanorama(rooms[initialRoom]);

            showInfoCard(initialRoom);

            updateBalconyControls(initialRoom); // ADD THIS

        }

















        // Hotspots
        addHotspot("lobby", "dinning", -70, -3, "Dinning");
        addHotspot("lobby", "kitchen", 220, -3, "Kitchen");
        addHotspot("lobby", "room_1", 140, -3, "Master Bedroom");
        addHotspot("lobby", "room_2", -40, -3, "Kid's Room");
        addHotspot("lobby", "room_3", -33, -3, "Guest's Room");







        addHotspot("dinning", "lobby", -150, -10, "Lobby");
        addHotspot("dinning", "kitchen", -60, -10, "Kitchen");
        addHotspot("dinning", "room_2", 70, -10, "Kid's Room");
        addHotspot("dinning", "room_3", 52, -4, "Guest's Room");

        addHotspot("dinning", "room_1", -108, 0, "Master Bedroom");




        addHotspot("kitchen", "lobby", 15, -10, "Lobby");
        addHotspot("kitchen", "dinning", -80, -10, "Dinning");
        addHotspot("kitchen", "room_2", -67, -5, "Kid's Room");
        addHotspot("kitchen", "room_1", 60, -5, "Master Bedroom");




        addHotspot("room_1", "lobby", -40, -6, "Lobby");
        addHotspot("room_3", "lobby", -155, -10, "Lobby");
        addHotspot("room_2", "lobby", -155, -10, "Lobby");


        addHotspot("room_1", "balcony", 120, -6, "Balcony");



        addHotspot("room_2", "balcony", 90, -6, "Balcony");

        addHotspot("room_3", "balcony", -60, -6, "Balcony");

        addHotspot("balcony", "room_1", 130, -6, "Master Bedroom");

        if (rooms[initialRoom]) {
            viewer.setPanorama(rooms[initialRoom]);
            showInfoCard(initialRoom);

            // Highlight correct pill
            document.querySelectorAll('.tour-pill').forEach(p => {
                p.classList.remove('active');

                const onclick = p.getAttribute('onclick');
                if (onclick && onclick.includes(`'${initialRoom}'`)) {
                    p.classList.add('active');
                }
            });
        } else {
            viewer.setPanorama(rooms.lobby);
            showInfoCard('lobby');
        }


        document.getElementById("backBtn").addEventListener("click", () => {
            window.history.back();
        });


    </script>

    <div id="fadeOverlay"></div>

</body>

</html>
